<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Заявка на співпрацю</title>
    <!-- Подключаем современный шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <!-- Анимированные фоновые элементы -->
      <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
      </div>

      <!-- Контейнер с формой (Glassmorphism) -->
      <div class="glass-container" id="form-container">
        <header class="brand-header">
          <h1>INST НА МІЛЬЙОН</h1>
          <div class="subtitle-pill">Команда з 5 спеціалістів допомагає вести твій Instagram — від сценарію до реклами</div>
        </header>

        <form id="lead-form" class="lead-form">
          <div class="input-group">
            <label for="name">Як до вас звертатися?</label>
            <input type="text" id="name" name="name" placeholder="Олександр" required>
          </div>

          <div class="input-group">
            <label for="instagram">Ваш Instagram (нік або посилання)</label>
            <input type="text" id="instagram" name="instagram" placeholder="@username або посилання" required>
          </div>

          <div class="input-group">
            <label for="contact">Ваш номер або Telegram для зв'язку</label>
            <input type="text" id="contact" name="contact" placeholder="+380 (99) 000-00-00 або @username" required>
          </div>

          <div class="input-group">
            <label for="task">Яке основне завдання або проблема зараз?</label>
            <textarea id="task" name="task" rows="3" placeholder="Опишіть ситуацію у вільній формі..."></textarea>
          </div>

          <div class="input-group">
            <p class="label-text">Чи готові ви розглядати співпрацю найближчим часом?</p>
            <div class="radio-group">
              <label class="radio-card">
                <input type="radio" name="readiness" value="Так, зараз актуально" required>
                <span class="card-content">✅ Так, зараз актуально</span>
              </label>
              
              <label class="radio-card">
                <input type="radio" name="readiness" value="Вивчаю варіанти">
                <span class="card-content">🔍 Вивчаю варіанти</span>
              </label>
              
              <label class="radio-card">
                <input type="radio" name="readiness" value="На майбутнє">
                <span class="card-content">📅 На майбутнє</span>
              </label>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="primary-btn">
            <span class="btn-text">Відправити заявку</span>
            <div class="spinner hide"></div>
          </button>
        </form>
      </div>

      <!-- Экран успешной отправки -->
      <div class="glass-container success-container hide" id="success-container">
        <div class="success-icon">✨</div>
        <h2>Дякуємо! Вашу заявку прийнято.</h2>
        <p>Зв'яжемося з вами найближчим часом для обговорення деталей.</p>
        <button id="reset-btn" class="secondary-btn">Повернутися</button>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
